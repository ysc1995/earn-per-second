<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060810;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Setup Screen ── */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 28px;
      animation: fadeIn 0.6s ease;
    }

    #setup h1 {
      font-size: 2.8rem;
      font-weight: 200;
      color: #f0c040;
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(240,192,64,0.3);
    }

    #setup .subtitle {
      color: #555;
      font-size: 0.95rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .currency {
      position: absolute;
      left: 18px;
      color: #f0c040;
      font-size: 1.4rem;
      pointer-events: none;
    }

    #income-input {
      background: rgba(240,192,64,0.06);
      border: 1px solid rgba(240,192,64,0.25);
      border-radius: 14px;
      color: #fff;
      font-size: 1.6rem;
      padding: 16px 22px 16px 46px;
      width: 320px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      -moz-appearance: textfield;
    }
    #income-input::-webkit-outer-spin-button,
    #income-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    #income-input::placeholder { color: #333; }
    #income-input:focus {
      border-color: rgba(240,192,64,0.7);
      box-shadow: 0 0 24px rgba(240,192,64,0.1);
    }
    #income-input.error {
      border-color: rgba(255,80,80,0.7);
      box-shadow: 0 0 16px rgba(255,80,80,0.15);
    }

    #start-btn {
      background: linear-gradient(135deg, #f0c040, #d4960a);
      border: none;
      border-radius: 14px;
      color: #000;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 56px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: transform 0.15s, box-shadow 0.3s;
      box-shadow: 0 4px 32px rgba(240,192,64,0.25);
    }
    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(240,192,64,0.4);
    }
    #start-btn:active { transform: translateY(0) scale(0.98); }

    /* ── Main Screen ── */
    #main {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #bg-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Center earnings display */
    .center-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }

    .today-label {
      color: #444;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    #today-earnings {
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 100;
      color: #f0c040;
      letter-spacing: -0.02em;
      text-shadow: 0 0 60px rgba(240,192,64,0.35);
      transition: text-shadow 0.1s;
    }

    #today-earnings.pulse {
      text-shadow: 0 0 80px rgba(240,192,64,0.7), 0 0 120px rgba(240,192,64,0.3);
    }

    .divider {
      width: 1px;
      height: 32px;
      background: linear-gradient(to bottom, transparent, rgba(240,192,64,0.3), transparent);
      margin: 18px auto;
    }

    .per-second-row {
      color: #3a3a3a;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
    }

    #per-second-val { color: #585840; }

    /* Date chip top center */
    #date-chip {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: #2a2a2a;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 10;
    }

    /* Floating money particles */
    .particle {
      position: absolute;
      pointer-events: none;
      font-weight: 400;
      color: #f0c040;
      white-space: nowrap;
      will-change: transform, opacity;
      z-index: 20;
      animation: floatUp var(--dur) ease-out forwards;
    }

    @keyframes floatUp {
      0%   { opacity: 0;   transform: translateY(0)     translateX(0)              scale(0.7); }
      12%  { opacity: 1;   transform: translateY(-22px) translateX(calc(var(--dx)*0.15)) scale(1); }
      75%  { opacity: 0.85; }
      100% { opacity: 0;   transform: translateY(-200px) translateX(var(--dx))     scale(0.92); }
    }

    /* Reset button */
    #reset-btn {
      position: absolute;
      bottom: 28px;
      right: 28px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: #555;
      padding: 8px 18px;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      transition: color 0.2s, border-color 0.2s;
      z-index: 30;
    }
    #reset-btn:hover { color: #aaa; border-color: rgba(255,255,255,0.25); }

    /* Annual income watermark bottom-left */
    #annual-label {
      position: absolute;
      bottom: 28px;
      left: 28px;
      color: #1e1e1e;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      z-index: 10;
    }

    #mute-btn {
      position: absolute;
      bottom: 28px;
      right: 88px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: #555;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      transition: color 0.2s, border-color 0.2s;
      z-index: 30;
    }
    #mute-btn:hover { color: #aaa; border-color: rgba(255,255,255,0.25); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<!-- ── Setup ── -->
<div id="setup">
  <h1>Money Flow</h1>
  <p class="subtitle">You earn money every single second</p>
  <div class="input-wrap">
    <span class="currency">$</span>
    <input type="number" id="income-input" placeholder="Annual income (USD)" min="1" autocomplete="off">
  </div>
  <button id="start-btn" onclick="startFlow()">Start</button>
</div>

<!-- ── Main ── -->
<div id="main">
  <canvas id="bg-canvas"></canvas>

  <div id="date-chip"></div>

  <div class="center-display">
    <div class="today-label">Earned Today</div>
    <div id="today-earnings">$0.00</div>
    <div class="divider"></div>
    <div class="per-second-row">per second &nbsp;<span id="per-second-val"></span></div>
  </div>

  <div id="annual-label"></div>
  <button id="mute-btn" onclick="toggleMute()" title="Mute">🔊</button>
  <button id="reset-btn" onclick="resetFlow()">Reset</button>
</div>

<script>
  let perSecond = 0;
  let rafId    = null;
  let tickId   = null;
  let mouseX   = null;
  let mouseY   = null;
  let muted    = false;
  let audioCtx = null;

const coinAudio = new Audio('512216__mateusz_chenc__coins.mp3');
  coinAudio.volume = 0.6;

  function playCoinSound() {
    if (muted) return;
    coinAudio.currentTime = 0;
    coinAudio.play().catch(() => {});
  }

  function toggleMute() {
    muted = !muted;
    document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  }

  // ── Format helpers ──
  function fmtMoney(v) {
    if (v >= 1e6)  return '$' + (v / 1e6).toFixed(3) + 'M';
    if (v >= 1e3)  return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    if (v >= 1)    return '$' + v.toFixed(2);
    if (v >= 0.01) return '$' + v.toFixed(4);
    if (v >= 1e-3) return '$' + v.toFixed(5);
    return '$' + v.toFixed(6);
  }

  function fmtParticle(v) {
    const s = fmtMoney(v);
    return '+' + s;
  }

  function getTodaySecs() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(0,0,0,0);
    return (now - midnight) / 1000;
  }

  // ── Start ──
  function startFlow() {
    const inp = document.getElementById('income-input');
    const annual = parseFloat(inp.value);
    if (!annual || annual <= 0) {
      inp.classList.add('error');
      inp.focus();
      setTimeout(() => inp.classList.remove('error'), 900);
      return;
    }

    perSecond = annual / (365 * 24 * 3600);

    document.getElementById('setup').style.display = 'none';
    const mainEl = document.getElementById('main');
    mainEl.style.display = 'block';

    // Labels
    document.getElementById('per-second-val').textContent = fmtMoney(perSecond);
    document.getElementById('annual-label').textContent =
      'Annual ' + annual.toLocaleString('en-US', {style:'currency', currency:'USD', maximumFractionDigits:0});
    const now = new Date();
    document.getElementById('date-chip').textContent =
      now.toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

    drawBg();

    // Smooth counter loop
    rafId = requestAnimationFrame(tick);

    // Particle every second + immediate first
    spawnParticle();
    tickId = setInterval(spawnParticle, 1000);
  }

  // ── Counter tick (rAF) ──
  function tick() {
    const earnings = getTodaySecs() * perSecond;
    document.getElementById('today-earnings').textContent = fmtMoney(earnings);
    rafId = requestAnimationFrame(tick);
  }

  // ── Spawn one floating particle ──
  function spawnParticle() {
    const mainEl = document.getElementById('main');
    const W = window.innerWidth;
    const H = window.innerHeight;

    // Use mouse position if available, else random (avoiding center)
    let x, y;
    if (mouseX !== null && mouseY !== null) {
      x = mouseX;
      y = mouseY;
    } else {
      const cx = W / 2, cy = H / 2, safeR = 260;
      do {
        x = 80 + Math.random() * (W - 160);
        y = 80 + Math.random() * (H - 160);
      } while (Math.hypot(x - cx, y - cy) < safeR);
    }

    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = fmtParticle(perSecond);

    const dur  = 2.8 + Math.random() * 1.8;           // 2.8–4.6 s
    const dx   = (Math.random() - 0.5) * 100;          // horizontal drift
    const size = 0.85 + Math.random() * 0.9;            // 0.85–1.75 rem
    const glow = Math.random() > 0.65;                  // 35% get extra glow

    el.style.left      = x + 'px';
    el.style.top       = y + 'px';
    el.style.setProperty('--dur', dur + 's');
    el.style.setProperty('--dx',  dx  + 'px');
    el.style.fontSize  = size + 'rem';
    if (glow) el.style.textShadow = '0 0 16px rgba(240,192,64,0.9), 0 0 32px rgba(240,192,64,0.5)';

    mainEl.appendChild(el);
    playCoinSound();

    // Pulse the center display
    const earnings = document.getElementById('today-earnings');
    earnings.classList.add('pulse');
    setTimeout(() => earnings.classList.remove('pulse'), 300);

    setTimeout(() => el.remove(), (dur + 0.2) * 1000);
  }

  // ── Background canvas: grid + radial glow ──
  function drawBg() {
    const canvas = document.getElementById('bg-canvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Grid
    ctx.strokeStyle = 'rgba(240,192,64,0.04)';
    ctx.lineWidth = 1;
    const gs = 70;
    for (let x = 0; x <= W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y <= H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Center radial glow
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W * 0.55);
    g.addColorStop(0,   'rgba(240,192,64,0.04)');
    g.addColorStop(0.5, 'rgba(240,192,64,0.015)');
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // Corner vignette
    const v = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, W*0.8);
    v.addColorStop(0, 'rgba(0,0,0,0)');
    v.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = v;
    ctx.fillRect(0,0,W,H);
  }

  // ── Reset ──
  function resetFlow() {
    cancelAnimationFrame(rafId);
    clearInterval(tickId);
    document.querySelectorAll('.particle').forEach(p => p.remove());
    document.getElementById('main').style.display  = 'none';
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('income-input').value  = '';
  }

  // Enter key to start
  document.getElementById('income-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startFlow();
  });

  // Redraw bg on resize
  window.addEventListener('resize', () => {
    if (document.getElementById('main').style.display !== 'none') drawBg();
  });

  document.getElementById('main').addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  document.getElementById('main').addEventListener('mouseleave', () => {
    mouseX = null;
    mouseY = null;
  });
</script>
</body>
</html>
